version: '3.8'

services:
  stm-saas-api:
    build: .
    container_name: stm-saas-api
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:stm_password@postgres:5432/stm_saas
      - REDIS_URL=redis://redis-stack:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - GEMINI_API_KEY=DONNÉE MANQUANTE
      # Accès à Ollama hébergé sur ta machine hôte (GPU RTX 4050)
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - STRIPE_SECRET_KEY=DONNÉE MANQUANTE
      - JWT_SECRET=super_secret_jwt_key
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis-stack
      - rabbitmq
    extra_hosts:
      - "host.docker.internal:host-gateway"

  kong-gateway:
    image: kong:3.4
    container_name: kong-gateway
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/usr/local/kong/declarative/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
    ports:
      - "8000:8000" # Entrée publique de ton SaaS (que React appellera)
    volumes:
      - ./kong.yml:/usr/local/kong/declarative/kong.yml
    depends_on:
      - stm-saas-api
      - redis-stack

  postgres:
    image: postgres:15-alpine
    container_name: stm-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=stm_password
      - POSTGRES_DB=stm_saas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis-stack:
    image: redis/redis-stack-server:latest # Nécessaire pour le Semantic Cache (RediSearch)
    container_name: stm-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: stm-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" # Dashboard RabbitMQ
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
